name: Publish to npm

# Publishes @flexops/sdk to registry.npmjs.org via npm trusted publishing
# (OIDC) — no stored token, no MFA prompt. Triggered on vX.Y.Z tag push or
# manual workflow_dispatch.
#
# One-time setup on npmjs.com (required before the first run):
#   1. Log in to npmjs.com → package @flexops/sdk → Settings → Trusted Publishers
#   2. Add a GitHub Actions trusted publisher with:
#        Organization or user: BillEisenman
#        Repository:           flexops-sdk-node
#        Workflow filename:    publish.yml
#        Environment:          (leave blank)
#   3. Ensure the npm account's 2FA mode is compatible — trusted publishing
#      bypasses the OTP-on-publish prompt because auth comes from the
#      verifiable OIDC token issued by GitHub, not from a stored secret.
#
# Docs: https://docs.npmjs.com/trusted-publishers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required to mint the OIDC token GitHub → npm exchanges

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify Gateway URL shipped
        run: |
          set -e
          if ! grep -q "gateway.flexops.io" dist/index.js; then
            echo "::error::dist/index.js does not reference gateway.flexops.io"
            exit 1
          fi
          if grep -q "api.flexops.io" dist/index.js; then
            echo "::error::dist/index.js still references the retired api.flexops.io"
            exit 1
          fi

      - name: Publish (OIDC trusted publisher)
        run: npm publish --access public --provenance
        # No NODE_AUTH_TOKEN env var. npm CLI 11.5+ detects the GitHub
        # OIDC context and exchanges it for a short-lived registry token.
